<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 250px;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1b2838;
            color: white;
        }
        .header {
            font-size: 16px;
            font-weight: bold;
            color: #66c0f4;
            border-bottom: 1px solid #3d4450;
            padding-bottom: 10px;
            margin-bottom: 10px;
            text-align: center;
        }
        .ad-box {
            background: linear-gradient(to right, #47bfff 0%, #1a44c2 100%);
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
            display: block;
        }
        .ad-box:hover {
            transform: scale(1.02);
        }
        .ad-title {
            font-weight: bold;
            font-size: 13px;
            color: white;
        }
        .ad-desc {
            font-size: 11px;
            color: #e0e0e0;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="header">Steam Float Pro</div>
    
    <a href="https://sponsor-siten.com" target="_blank" class="ad-box">
        <div class="ad-title">For advertising and partnerships, contact fatihque0@gmail.com
</div>
        <div class="ad-desc">En güvenilir skin takas sitesini ziyaret et.</div>
    </a>

    <div style="font-size: 10px; margin-top: 15px; color: #888; text-align: center;">
        Sürüm 1.0 - Aktif ve Çalışıyor
    </div>
</body>
</html>
